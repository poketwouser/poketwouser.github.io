title: "Kiran Kumar P — AI Engineer · Quant Researcher · Builder"
description: "Kiran Kumar P — B.Tech in AI & Data Analytics at IIT Madras. AI engineer, quant researcher and builder. Applied ML research, quantitative finance, computer vision, agentic AI and security."
author: "Kiran Kumar P"
url: "https://poketwouser.github.io"
baseurl: ""

markdown: kramdown

# Custom portfolio — bespoke layouts in _layouts, no Jekyll theme.
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

# Blog posts live under /Blogs/ (the writing sub-site), keeping the
# original published URLs. Portfolio pages set their own permalinks.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /Blogs/:title/
      main_class: inner
